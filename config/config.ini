# WenQu 配置文件
# 所有大模型相关能力都通过 llama-server 提供

[llm]
# LLM 模型配置（使用 llama-server）
base_url = http://localhost:8080
temperature = 0.7
max_tokens = 1024

[embedding]
# 嵌入模型配置（使用 llama-server）
base_url = http://localhost:8080
embed_dim = 768

[database]
# PostgreSQL 数据库配置
host = localhost
port = 5432
database = wenqu
user = postgres
password = postgres
table_name = documents

[server]
# 服务器配置
host = 0.0.0.0
port = 8000
debug = false

[rag]
# RAG 配置
chunk_size = 1000
chunk_overlap = 200
