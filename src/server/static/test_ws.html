<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .connected { background: #c8e6c9; color: #2e7d32; }
        .disconnected { background: #ffcdd2; color: #c62828; }
        .connecting { background: #fff9c4; color: #f57f17; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        #messages {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }
        .message {
            padding: 5px 10px;
            margin: 5px 0;
            border-radius: 3px;
        }
        .message.sent { background: #e3f2fd; }
        .message.received { background: #f3e5f5; }
    </style>
</head>
<body>
    <h1>WebSocket 测试页面</h1>
    
    <div id="status" class="status disconnected">未连接</div>
    
    <div>
        <button onclick="connectWS()">连接 WebSocket</button>
        <button onclick="disconnectWS()">断开连接</button>
        <button onclick="sendMessage()">发送测试消息</button>
        <button onclick="sendQuery()">发送查询</button>
    </div>
    
    <div>
        <input type="text" id="queryInput" placeholder="输入查询内容" style="width: 300px; padding: 5px;">
    </div>
    
    <h3>消息日志:</h3>
    <div id="messages"></div>
    
    <script>
        let ws = null;
        
        function addMessage(text, type) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function updateStatus(status) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${status}`;
            const statusText = {
                connected: '已连接',
                disconnected: '未连接',
                connecting: '连接中...'
            };
            statusDiv.textContent = statusText[status];
        }
        
        function connectWS() {
            if (ws) {
                addMessage('WebSocket 已存在', 'sent');
                return;
            }
            
            updateStatus('connecting');
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/agent`;
            
            addMessage(`正在连接：${wsUrl}`, 'sent');
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                addMessage('WebSocket 连接成功！', 'received');
                updateStatus('connected');
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    addMessage(`收到消息：${JSON.stringify(data)}`, 'received');
                } catch (e) {
                    addMessage(`收到原始消息：${event.data}`, 'received');
                }
            };
            
            ws.onerror = function() {
                addMessage('WebSocket 错误', 'sent');
                updateStatus('disconnected');
            };
            
            ws.onclose = function() {
                addMessage('WebSocket 连接关闭', 'sent');
                updateStatus('disconnected');
                ws = null;
            };
        }
        
        function disconnectWS() {
            if (ws) {
                ws.close();
                ws = null;
                addMessage('主动断开连接', 'sent');
            }
        }
        
        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('WebSocket 未连接', 'sent');
                return;
            }
            
            const msg = { type: 'test', content: 'Hello Server' };
            ws.send(JSON.stringify(msg));
            addMessage(`发送：${JSON.stringify(msg)}`, 'sent');
        }
        
        function sendQuery() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('WebSocket 未连接', 'sent');
                return;
            }
            
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('请输入查询内容');
                return;
            }
            
            // 通过 HTTP POST 发送查询
            fetch('/api/agent/execute', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `query=${encodeURIComponent(query)}`
            })
            .then(response => response.json())
            .then(data => {
                addMessage(`查询提交成功：${JSON.stringify(data)}`, 'sent');
            })
            .catch(error => {
                addMessage(`查询失败：${error.message}`, 'sent');
            });
        }
        
        // 页面加载时自动连接
        window.addEventListener('load', () => {
            addMessage('页面加载完成', 'received');
            setTimeout(connectWS, 500);
        });
    </script>
</body>
</html>
