<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WenQu - 本地 AI Agent 系统</title>
    <link rel="stylesheet" href="/static/assets/styles.css">
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-js"></div>
    
    <div class="main-container">
        <!-- Logo 区域 -->
        <div class="logo-section">
            <h1 class="logo-text">
                <span class="logo-letter" data-letter="W" style="color: #4285f4;">W</span>
                <span class="logo-letter" data-letter="e" style="color: #ea4335;">e</span>
                <span class="logo-letter" data-letter="n" style="color: #fbbc05;">n</span>
                <span class="logo-letter" data-letter="Q" style="color: #4285f4;">Q</span>
                <span class="logo-letter" data-letter="u" style="color: #34a853;">u</span>
            </h1>
            <p class="logo-subtitle fade-in">本地 AI Agent 系统</p>
        </div>

        <!-- 主要内容区域 -->
        <div class="content-section slide-up">
            <!-- 用户输入框 -->
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    class="main-input"
                    placeholder="请输入您的问题或请求..."
                    rows="3"
                ></textarea>
                <div class="input-glow"></div>
            </div>

            <!-- 文件上传和执行按钮（水平布局） -->
            <div class="action-section">
                <div class="button-row">
                    <input 
                        type="file" 
                        id="fileInput" 
                        multiple 
                        style="display: none;"
                        onchange="handleFileSelect(event)"
                    />
                    <button 
                        id="uploadBtn" 
                        class="upload-button"
                        onclick="document.getElementById('fileInput').click()"
                    >
                        <span class="button-icon">📁</span>
                        <span class="button-text">选择文件/文件夹</span>
                    </button>
                    
                    <button 
                        id="executeBtn" 
                        class="execute-button"
                        onclick="handleExecute()"
                    >
                        <span id="executeBtnText" class="btn-text">🚀 执行</span>
                        <span id="executeBtnLoader" class="loader"></span>
                        <div class="btn-particles"></div>
                    </button>
                </div>
                
                <!-- 已选文件列表 -->
                <div id="fileList" class="file-list"></div>
            </div>
        </div>

        <!-- 模型思考过程显示区域 -->
        <div id="thoughtSection" class="thought-section" style="display: none;">
            <div class="thought-header" onclick="toggleThoughtCollapse()">
                <span id="thoughtArrow" class="arrow">▶</span>
                <span>💭 模型思考过程</span>
                <span id="thoughtCount" class="thought-count">0 条思考</span>
            </div>
            
            <div id="thoughtContent" class="thought-content">
                <div id="thoughtMessages" class="thought-messages"></div>
            </div>
        </div>

        <!-- 执行过程显示区域 -->
        <div id="processSection" class="process-section" style="display: none;">
            <div class="process-header" onclick="toggleProcessCollapse()">
                <span id="processArrow" class="arrow">▶</span>
                <span>执行过程</span>
                <span id="processCount" class="process-count">0 条消息</span>
            </div>
            
            <div id="processContent" class="process-content">
                <div id="processMessages"></div>
            </div>
        </div>

        <!-- 结果展示区域 -->
        <div id="resultSection" class="result-section" style="display: none;">
            <div class="result-header" onclick="toggleResultCollapse()">
                <span id="resultArrow" class="arrow">▶</span>
                <span>执行结果</span>
            </div>
            
            <div id="resultContent" class="result-content">
                <div id="resultBody" class="markdown-body"></div>
                <button class="copy-button" onclick="copyResult()">
                    📋 复制结果
                </button>
            </div>
        </div>

        <!-- WebSocket 连接状态指示器 -->
        <div id="statusIndicator" class="status-indicator disconnected">
            <span class="status-dot"></span>
            <span id="statusText" class="status-text">未连接</span>
            <div class="status-ring"></div>
        </div>
    </div>

    <!-- 动画库 -->
    <script src="/static/assets/particles.min.js?t=202604241915"></script>
    <script src="/static/assets/anime.min.js?t=202604241915"></script>
    <script>
        console.log('检查动画库加载...');
        if (typeof anime === 'undefined') {
            console.error('❌ anime.js 未加载');
        } else {
            console.log('✅ anime.js 已加载，版本:', anime.version);
        }
        if (typeof particlesJS === 'undefined') {
            console.warn('⚠️ particles.js 未加载');
        } else {
            console.log('✅ particles.js 已加载');
        }
    </script>
    <script src="/static/assets/app.js?t=202604241915"></script>
</body>
</html>
