<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WenQu - 本地 AI Agent 系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .status {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .status h2 {
            color: #16a34a;
            font-size: 1.2em;
            margin-bottom: 5px;
        }
        
        .status p {
            color: #15803d;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result-section {
            background: #f9fafb;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .todo-list {
            list-style: none;
        }
        
        .todo-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .todo-item strong {
            color: #667eea;
        }
        
        .api-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e5e7eb;
            text-align: center;
        }
        
        .api-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .api-links a:hover {
            background: #667eea;
            color: white;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 WenQu</h1>
        <p class="subtitle">本地 AI Agent 系统 - 智能需求分析与任务规划</p>
        
        <div class="status">
            <h2>✅ 服务运行正常</h2>
            <p>API 地址：<a href="/docs" target="_blank">http://localhost:8000/docs</a></p>
        </div>
        
        <div class="input-section">
            <textarea id="userInput" placeholder="请输入你的需求，例如：&#10;帮我创建一个简单的 Python Web 应用，需要实现用户登录功能..."></textarea>
            
            <button class="btn" onclick="analyzeRequest()">🚀 分析需求</button>
            <button class="btn" onclick="clearInput()">🗑️ 清空</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在分析您的需求，请稍候...</p>
        </div>
        
        <div class="result-section" id="result">
            <h3>📋 分析结果</h3>
            <div id="resultContent"></div>
        </div>
        
        <div class="api-links">
            <a href="/docs" target="_blank">📖 API 文档</a>
            <a href="/health" target="_blank">❤️ 健康检查</a>
            <a href="https://github.com/ggerganov/llama.cpp" target="_blank">🦙 llama.cpp</a>
        </div>
    </div>
    
    <script>
        async function analyzeRequest() {
            const userInput = document.getElementById('userInput').value.trim();
            
            if (!userInput) {
                alert('请输入需求内容');
                return;
            }
            
            // 显示加载动画
            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_input: userInput,
                        context: ''
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                // 显示结果
                const resultContent = document.getElementById('resultContent');
                let html = '';
                
                if (result.key_points && result.key_points.length > 0) {
                    html += '<div class="todo-item"><strong>🎯 关键需求：</strong><ul>';
                    result.key_points.forEach(point => {
                        html += `<li>${point}</li>`;
                    });
                    html += '</ul></div>';
                }
                
                if (result.unclear_points && result.unclear_points.length > 0) {
                    html += '<div class="todo-item"><strong>❓ 不清晰点：</strong><ul>';
                    result.unclear_points.forEach(point => {
                        html += `<li>${point}</li>`;
                    });
                    html += '</ul></div>';
                }
                
                if (result.todos && result.todos.length > 0) {
                    html += '<div class="todo-item"><strong>📝 TODO 列表：</strong><ul class="todo-list">';
                    result.todos.forEach((todo, index) => {
                        html += `<li class="todo-item">
                            <strong>任务 ${index + 1}:</strong> ${todo.task || todo}
                            ${todo.priority ? `<br><small>优先级：${todo.priority}</small>` : ''}
                        </li>`;
                    });
                    html += '</ul></div>';
                }
                
                resultContent.innerHTML = html;
                document.getElementById('result').classList.add('show');
                
            } catch (error) {
                alert('分析失败：' + error.message);
                console.error('Error:', error);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        function clearInput() {
            document.getElementById('userInput').value = '';
            document.getElementById('result').classList.remove('show');
        }
    </script>
</body>
</html>
